<!DOCTYPE html>
<html>
<body>
<h2><center>Book Ride</center></h2>

<input id="pickup" placeholder="Pickup">
<input id="drop" placeholder="Drop">
<button onclick="bookRide()">Book Ride</button>

<script>
async function bookRide() {
    const pickup = document.getElementById("pickup").value
    const drop = document.getElementById("drop").value

    const res = await fetch(
        `http://127.0.0.1:8000/book_ride?pickup=${pickup}&drop=${drop}`,
        { method: "POST" }
    )

    const data = await res.json()
    alert("Ride booked: " + data.id)
}
</script>

<iframe
width="600"
height="400"
src="https://www.openstreetmap.org/export/embed.html"
</iframe>

</body>
</html>
